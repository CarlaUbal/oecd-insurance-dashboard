<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OECD Insurance Dashboard — Benchmarking</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
/* ===== CSS Variables ===== */
:root{
  --bg:#f4f6f9;--surface:#ffffff;--text:#1a1a2e;--text-secondary:#555;--border:#dde1e6;
  --accent:#0066ff;--accent2:#ff7a00;--kpi-bg:#eef3ff;--shadow:0 2px 12px rgba(0,0,0,.06);
  --radius:12px;--transition:.3s ease;
}
[data-theme="dark"]{
  --bg:#0f1117;--surface:#1a1d2e;--text:#e8eaed;--text-secondary:#9aa0b0;--border:#2d3244;
  --accent:#4d94ff;--accent2:#ffaa44;--kpi-bg:#242840;--shadow:0 2px 12px rgba(0,0,0,.35);
}

/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);transition:background var(--transition),color var(--transition);min-height:100vh;}

/* ===== Header ===== */
.header{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow);flex-wrap:wrap;gap:12px;}
.header h1{font-size:1.35rem;font-weight:700;letter-spacing:-.5px;}
.header h1 span{color:var(--accent);font-weight:300;}
.header-actions{display:flex;gap:10px;align-items:center;}
.btn{padding:8px 18px;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:8px;font-size:.85rem;cursor:pointer;transition:all var(--transition);font-family:inherit;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-icon{font-size:1.1rem;}

/* ===== Main Container ===== */
.container{max-width:1360px;margin:0 auto;padding:24px 28px 48px;}

/* ===== Filters ===== */
.filters-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);margin-bottom:24px;}
.filters-title{font-size:.8rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-secondary);margin-bottom:14px;font-weight:600;}
.filters-row{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;}
.filter-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:180px;}
.filter-group label{font-size:.78rem;font-weight:500;color:var(--text-secondary);}
.filter-group select{padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:inherit;font-size:.88rem;cursor:pointer;transition:border var(--transition);}
.filter-group select:focus{outline:none;border-color:var(--accent);}

/* ===== KPIs ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;margin-bottom:24px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);transition:transform var(--transition);}
.kpi-card:hover{transform:translateY(-2px);}
.kpi-label{font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary);margin-bottom:8px;font-weight:600;}
.kpi-value{font-size:1.65rem;font-weight:700;color:var(--accent);line-height:1.2;}
.kpi-value.orange{color:var(--accent2);}
.kpi-sub{font-size:.78rem;color:var(--text-secondary);margin-top:4px;}

/* ===== Charts ===== */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:860px){.charts-grid{grid-template-columns:1fr;}}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px 16px;box-shadow:var(--shadow);}
.chart-card h3{font-size:.92rem;font-weight:600;margin-bottom:14px;}
.chart-wrap{position:relative;width:100%;height:340px;}
.chart-wrap canvas{width:100%!important;height:100%!important;}

/* ===== Error ===== */
.error-msg{background:#fff3f3;border:1px solid #ffb3b3;color:#cc0000;padding:14px 20px;border-radius:var(--radius);font-size:.88rem;margin-bottom:20px;display:none;}
[data-theme="dark"] .error-msg{background:#2d1a1a;border-color:#663333;color:#ff6666;}

/* ===== Footer ===== */
.footer{text-align:center;padding:20px;font-size:.75rem;color:var(--text-secondary);}

/* ===== Responsive ===== */
@media(max-width:600px){
  .header{padding:14px 16px;}
  .container{padding:16px 12px 32px;}
  .kpi-value{font-size:1.3rem;}
  .chart-wrap{height:260px;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <h1>📊 OECD Insurance <span>Dashboard</span></h1>
  <div class="header-actions">
    <button class="btn" id="btnCsv" title="Descargar CSV"><span class="btn-icon">⬇</span> CSV</button>
    <button class="btn" id="btnTheme" title="Alternar Modo Claro/Oscuro"><span class="btn-icon">🌙</span> Tema</button>
  </div>
</header>

<!-- MAIN -->
<div class="container">

  <!-- Error -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Filters -->
  <div class="filters-card">
    <div class="filters-title">Filtros de Benchmarking</div>
    <div class="filters-row">
      <div class="filter-group">
        <label for="regionA">Región País A</label>
        <select id="regionA"><option value="all">Todas las regiones</option></select>
      </div>
      <div class="filter-group">
        <label for="selA">País A</label>
        <select id="selA"></select>
      </div>
      <div class="filter-group">
        <label for="regionB">Región País B</label>
        <select id="regionB"><option value="all">Todas las regiones</option></select>
      </div>
      <div class="filter-group">
        <label for="selB">País B</label>
        <select id="selB"></select>
      </div>
      <div class="filter-group">
        <label for="selYear">Año de Corte</label>
        <select id="selYear"></select>
      </div>
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-label" id="kpiLabelA">País A</div><div class="kpi-value" id="kpiValA">—</div><div class="kpi-sub" id="kpiSubA"></div></div>
    <div class="kpi-card"><div class="kpi-label" id="kpiLabelB">País B</div><div class="kpi-value orange" id="kpiValB">—</div><div class="kpi-sub" id="kpiSubB"></div></div>
    <div class="kpi-card"><div class="kpi-label">Brecha de Mercado</div><div class="kpi-value" id="kpiGap">—</div><div class="kpi-sub" id="kpiGapSub"></div></div>
    <div class="kpi-card"><div class="kpi-label">Diferencial %</div><div class="kpi-value" id="kpiDiff">—</div><div class="kpi-sub" id="kpiDiffSub"></div></div>
  </div>

  <!-- Charts -->
  <div class="charts-grid">
    <div class="chart-card">
      <h3>📈 Evolución Histórica — Direct Gross Premiums (M USD)</h3>
      <div class="chart-wrap"><canvas id="lineChart"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>📊 Crecimiento Acumulado % desde 2010</h3>
      <div class="chart-wrap"><canvas id="barChart"></canvas></div>
    </div>
  </div>
</div>

<footer class="footer">OECD Insurance Dashboard &copy; 2026 — Datos ilustrativos basados en tendencias históricas reales.</footer>

<script>
/* ============================================================
   DATA — 38 OECD countries, Direct Gross Premiums (M USD)
   Values reflect realistic trends, 2020 pandemic dip, recovery.
   ============================================================ */
const REGIONS = {
  "Europa": ["Austria","Belgium","Czech Republic","Denmark","Estonia","Finland","France","Germany","Greece","Hungary","Iceland","Ireland","Italy","Latvia","Lithuania","Luxembourg","Netherlands","Norway","Poland","Portugal","Slovak Republic","Slovenia","Spain","Sweden","Switzerland","United Kingdom","Türkiye"],
  "América": ["Canada","Chile","Colombia","Costa Rica","Mexico","United States"],
  "Asia-Pacífico": ["Australia","Israel","Japan","Korea","New Zealand"]
};

const DB = {
"Australia":[72000,74500,77200,79800,82500,85800,88200,91500,94200,92000,95800,99500,103000,107200,111500,115500],
"Austria":[19200,19700,20100,20600,21200,21700,22300,22900,23500,22800,23800,24600,25400,26300,27100,27900],
"Belgium":[33500,34200,35000,35700,36600,37300,38100,39000,39900,38500,40200,41500,42900,44200,45600,47000],
"Canada":[112000,116200,120800,125400,130200,135500,140800,146500,152400,148000,155200,162100,169500,176800,184600,192500],
"Chile":[12500,13200,14000,14800,15600,16500,17300,18200,19100,18200,19500,20800,22100,23500,24900,26300],
"Colombia":[9200,9800,10500,11200,12000,12800,13600,14500,15400,14800,15900,17100,18300,19600,20900,22200],
"Costa Rica":[2100,2250,2400,2560,2730,2910,3100,3300,3500,3350,3600,3860,4130,4410,4700,5000],
"Czech Republic":[8200,8450,8700,8960,9250,9550,9860,10200,10550,10200,10700,11200,11700,12200,12750,13300],
"Denmark":[27500,28200,28900,29600,30400,31200,32000,32900,33700,32800,34200,35500,36900,38300,39800,41300],
"Estonia":[820,860,900,945,990,1040,1095,1150,1210,1160,1230,1310,1390,1480,1570,1660],
"Finland":[22800,23400,24000,24600,25300,26000,26700,27500,28200,27200,28500,29700,30900,32200,33500,34800],
"France":[248000,254000,260500,267000,274000,281000,288500,296500,304500,294000,307000,318500,330500,343000,356000,369500],
"Germany":[230000,236000,242000,248500,255000,262000,269500,277000,285000,276000,288000,299500,311500,324000,337000,350500],
"Greece":[5800,5500,5300,5200,5150,5200,5300,5450,5600,5350,5600,5850,6100,6400,6700,7000],
"Hungary":[3900,4050,4200,4370,4540,4720,4910,5110,5320,5100,5400,5720,6050,6400,6770,7150],
"Iceland":[670,690,710,730,755,780,805,835,865,830,875,920,968,1020,1070,1125],
"Ireland":[22800,23500,24300,25100,25900,26800,27700,28700,29700,28500,30100,31700,33400,35200,37000,38900],
"Israel":[16500,17100,17700,18400,19100,19800,20600,21400,22200,21500,22700,24000,25300,26700,28200,29700],
"Italy":[158000,155000,152500,150000,148500,149000,151000,154000,157000,151000,157500,163500,170000,177000,184000,191500],
"Japan":[480000,486000,492000,498000,504000,510500,517000,524000,531000,520000,534000,548000,562500,577500,593000,609000],
"Korea":[158000,164000,170500,177500,184500,192000,200000,208000,216500,210000,221000,232500,244500,257000,270000,283500],
"Latvia":[630,660,695,730,765,805,845,890,935,900,955,1015,1080,1145,1215,1290],
"Lithuania":[1050,1110,1170,1240,1310,1390,1470,1560,1650,1580,1690,1800,1920,2050,2180,2320],
"Luxembourg":[26500,27500,28600,29700,30900,32100,33400,34700,36100,34800,36600,38500,40500,42600,44800,47100],
"Mexico":[25000,26200,27500,28900,30300,31800,33400,35100,36800,35200,37400,39800,42300,44900,47700,50600],
"Netherlands":[82000,83500,85000,86700,88400,90200,92100,94100,96200,93000,97000,101000,105200,109500,114000,118700],
"New Zealand":[10200,10600,11000,11400,11900,12400,12900,13400,14000,13500,14200,15000,15800,16600,17500,18400],
"Norway":[26000,26800,27600,28500,29400,30300,31300,32300,33400,32200,33800,35500,37200,39000,40900,42900],
"Poland":[18500,19200,19900,20700,21500,22400,23300,24200,25200,24200,25600,27100,28600,30200,31900,33700],
"Portugal":[12800,12500,12300,12200,12300,12500,12800,13200,13600,13100,13700,14400,15100,15800,16600,17400],
"Slovak Republic":[3300,3400,3510,3620,3740,3870,4000,4140,4280,4120,4350,4590,4840,5100,5380,5670],
"Slovenia":[2600,2670,2740,2820,2900,2980,3070,3160,3250,3130,3300,3480,3670,3870,4080,4300],
"Spain":[67000,64500,62500,61000,60500,61500,63000,65000,67500,64500,68000,71500,75200,79000,83000,87200],
"Sweden":[36000,37200,38500,39800,41200,42700,44200,45800,47500,45800,48200,50800,53500,56300,59200,62300],
"Switzerland":[62000,63500,65000,66600,68200,70000,71800,73700,75600,73000,76500,80000,83700,87500,91500,95700],
"Türkiye":[12500,13500,14600,15800,17100,18500,20000,21600,23400,22000,24000,26200,28500,31000,33800,36800],
"United Kingdom":[310000,318000,326000,334500,343500,353000,362500,372500,383000,370000,387000,403000,420000,437500,456000,475000],
"United States":[1180000,1220000,1262000,1305000,1350000,1398000,1448000,1500000,1555000,1510000,1580000,1655000,1735000,1820000,1910000,2005000]
};

const YEARS = [];
for(let y=2010;y<=2025;y++) YEARS.push(y);

/* ============================================================
   DOM References
   ============================================================ */
const $=id=>document.getElementById(id);
const regionA=$('regionA'),selA=$('selA'),regionB=$('regionB'),selB=$('selB'),selYear=$('selYear');
const errorMsg=$('errorMsg');
let lineChart,barChart;

/* ============================================================
   Helpers
   ============================================================ */
function showError(msg){errorMsg.textContent=msg;errorMsg.style.display='block';}
function hideError(){errorMsg.style.display='none';}
function fmt(n){if(Math.abs(n)>=1e6) return (n/1e6).toFixed(1)+'M';if(Math.abs(n)>=1e3) return (n/1e3).toFixed(1)+'K';return n.toLocaleString('es-ES');}
function fmtUSD(n){return '$'+fmt(n)+' M USD';}
function pct(v){return (v>=0?'+':'')+v.toFixed(2)+'%';}

function getRegion(country){
  for(const[r,list] of Object.entries(REGIONS)) if(list.includes(country)) return r;
  return 'Otro';
}

/* ============================================================
   Populate Selectors
   ============================================================ */
function populateRegions(){
  const regions=Object.keys(REGIONS);
  [regionA,regionB].forEach(sel=>{
    sel.innerHTML='<option value="all">Todas las regiones</option>';
    regions.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;sel.appendChild(o);});
  });
}

function populateCountries(selectEl,regionVal){
  const prev=selectEl.value;
  selectEl.innerHTML='';
  let countries=Object.keys(DB).sort();
  if(regionVal && regionVal!=='all'){
    countries=countries.filter(c=>(REGIONS[regionVal]||[]).includes(c));
  }
  countries.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;selectEl.appendChild(o);});
  if(countries.includes(prev)) selectEl.value=prev;
}

function populateYears(){
  selYear.innerHTML='';
  YEARS.forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y;selYear.appendChild(o);});
  selYear.value=2025;
}

/* ============================================================
   Render
   ============================================================ */
function chartColors(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  return{grid:isDark?'rgba(255,255,255,.08)':'rgba(0,0,0,.07)',tick:isDark?'#9aa0b0':'#666'};
}

function render(){
  hideError();
  const cA=selA.value, cB=selB.value, cutYear=parseInt(selYear.value);
  if(!cA||!cB){showError('Selecciona ambos países para continuar.');return;}
  if(!DB[cA]){showError(`No hay datos disponibles para "${cA}".`);return;}
  if(!DB[cB]){showError(`No hay datos disponibles para "${cB}".`);return;}

  const idxCut=YEARS.indexOf(cutYear);
  const dataA=DB[cA], dataB=DB[cB];
  const valA=dataA[idxCut], valB=dataB[idxCut];
  const gap=valA-valB;
  const diffPct=valB!==0?((valA-valB)/valB)*100:0;
  const growA=dataA[0]!==0?((dataA[idxCut]-dataA[0])/dataA[0])*100:0;
  const growB=dataB[0]!==0?((dataB[idxCut]-dataB[0])/dataB[0])*100:0;

  /* KPIs */
  $('kpiLabelA').textContent=cA;
  $('kpiValA').textContent=fmtUSD(valA);
  $('kpiSubA').textContent='Crec. acum.: '+pct(growA);
  $('kpiLabelB').textContent=cB;
  $('kpiValB').textContent=fmtUSD(valB);
  $('kpiSubB').textContent='Crec. acum.: '+pct(growB);
  $('kpiGap').textContent=(gap>=0?'+':'')+fmt(gap)+' M USD';
  $('kpiGapSub').textContent=cA+' vs '+cB;
  $('kpiDiff').textContent=pct(diffPct);
  $('kpiDiffSub').textContent=cA+' respecto a '+cB;

  /* Colors */
  const cc=chartColors();
  const labels=YEARS.slice(0,idxCut+1);

  /* Line Chart */
  if(lineChart) lineChart.destroy();
  lineChart=new Chart($('lineChart'),{
    type:'line',
    data:{
      labels,
      datasets:[
        {label:cA,data:dataA.slice(0,idxCut+1),borderColor:'#0066ff',backgroundColor:'rgba(0,102,255,.08)',borderWidth:2.5,pointRadius:3,pointHoverRadius:6,tension:.3,fill:true},
        {label:cB,data:dataB.slice(0,idxCut+1),borderColor:'#ff7a00',backgroundColor:'rgba(255,122,0,.08)',borderWidth:2.5,borderDash:[6,4],pointRadius:3,pointHoverRadius:6,tension:.3,fill:true}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:cc.tick,font:{family:'Inter'}}},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': $'+ctx.parsed.y.toLocaleString('es-ES')+' M'}}},
      scales:{x:{grid:{color:cc.grid},ticks:{color:cc.tick,font:{family:'Inter'}}},y:{grid:{color:cc.grid},ticks:{color:cc.tick,font:{family:'Inter'},callback:v=>'$'+fmt(v)}}}
    }
  });

  /* Bar Chart */
  if(barChart) barChart.destroy();
  barChart=new Chart($('barChart'),{
    type:'bar',
    data:{
      labels:[cA,cB],
      datasets:[{
        label:'Crecimiento Acumulado %',
        data:[growA,growB],
        backgroundColor:['rgba(0,102,255,.75)','rgba(255,122,0,.75)'],
        borderColor:['#0066ff','#ff7a00'],
        borderWidth:2,
        borderRadius:8,
        maxBarThickness:90
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      indexAxis:'y',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>pct(ctx.parsed.x)}}},
      scales:{x:{grid:{color:cc.grid},ticks:{color:cc.tick,font:{family:'Inter'},callback:v=>v+'%'}},y:{grid:{display:false},ticks:{color:cc.tick,font:{family:'Inter',weight:600}}}}
    }
  });
}

/* ============================================================
   Theme Toggle
   ============================================================ */
$('btnTheme').addEventListener('click',()=>{
  const html=document.documentElement;
  const next=html.getAttribute('data-theme')==='dark'?'light':'dark';
  html.setAttribute('data-theme',next);
  $('btnTheme').querySelector('.btn-icon').textContent=next==='dark'?'☀️':'🌙';
  render();
});

/* ============================================================
   CSV Export
   ============================================================ */
$('btnCsv').addEventListener('click',()=>{
  const cA=selA.value, cB=selB.value, cutYear=parseInt(selYear.value);
  const idxCut=YEARS.indexOf(cutYear);
  let csv='Año,'+cA+' (M USD),'+cB+' (M USD)\n';
  for(let i=0;i<=idxCut;i++){
    csv+=YEARS[i]+','+DB[cA][i]+','+DB[cB][i]+'\n';
  }
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='oecd_insurance_'+cA+'_vs_'+cB+'_'+cutYear+'.csv';
  a.click();URL.revokeObjectURL(url);
});

/* ============================================================
   Event Listeners
   ============================================================ */
regionA.addEventListener('change',()=>{populateCountries(selA,regionA.value);render();});
regionB.addEventListener('change',()=>{populateCountries(selB,regionB.value);render();});
selA.addEventListener('change',render);
selB.addEventListener('change',render);
selYear.addEventListener('change',render);

/* ============================================================
   Init
   ============================================================ */
populateRegions();
populateCountries(selA,'all');
populateCountries(selB,'all');
populateYears();
selA.value='Spain';
selB.value='Germany';
render();
</script>
</body>
</html>
